description: WCH CH5xx Programmable Fast Interrupt Controller (PFIC)

compatible: "wch,ch5xx-pfic"

include: [interrupt-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  "#interrupt-cells":
    const: 3

interrupt-cells:
  - irq
  - priority
  - flags
