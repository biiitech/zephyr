description: WCH I2C controller

compatible: "wch,i2c"

include: [i2c-controller.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  clocks:
    description: |
      select clock to enable, before this peripheral can be used
      optional on ch5xx, and required by ch32v family

  interrupts:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true
